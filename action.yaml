name: "Setup Proxy Cache"

inputs:
  enable-pip:
    description: "Setup pip to use the proxy cache"
    required: false
    default: true
  enable-conda:
    description: "Setup conda to use the proxy cache"
    required: false
    default: true
  enable-apt:
    description: "Setup apt to use the proxy cache"
    required: false
    default: false

runs:
  using: "composite"
  steps:
    - name: Setup pip to use the proxy cache
      if: ${{ inputs.enable-pip }}
      run: echo "PIP_INDEX_URL=https://pip-cache.local.gha-runners.nvidia.com/simple" >> "${GITHUB_ENV}"
      shell: bash
    - name: Setup conda to use the proxy cache
      if: ${{ inputs.enable-conda }}
      run: echo "CONDA_CHANNEL_ALIAS=https://conda-cache.local.gha-runners.nvidia.com/" >> "${GITHUB_ENV}"
      shell: bash
    - name: Setup apt to use the proxy cache
      if: ${{ inputs.enable-apt }}
      run: |
        # Only run on Ubuntu
        if ! grep -q "^ID=ubuntu" /etc/os-release 2>/dev/null; then
          echo "Not Ubuntu, skipping apt cache setup"
          exit 0
        fi

        # Skip if sed isn't available
        if ! command -v sed >/dev/null 2>&1; then
          echo "sed not found, skipping apt cache setup"
          exit 0
        fi

        # Figure out if we need sudo
        SUDO=""
        if [ "$(id -u)" -ne 0 ] && command -v sudo >/dev/null 2>&1; then
          SUDO="sudo"
        fi

        # Configure apt to use cache servers
        # Try new format first (Ubuntu 22.04+), fall back to old format
        if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
          $SUDO sed -i 's|https\?://archive.ubuntu.com/ubuntu|http://ubuntu-archive-cache.local.gha-runners.nvidia.com/ubuntu|g' /etc/apt/sources.list.d/ubuntu.sources
          $SUDO sed -i 's|https\?://security.ubuntu.com/ubuntu|http://ubuntu-security-cache.local.gha-runners.nvidia.com/ubuntu|g' /etc/apt/sources.list.d/ubuntu.sources
          $SUDO sed -i 's|https\?://ports.ubuntu.com/ubuntu-ports|http://ubuntu-ports-cache.local.gha-runners.nvidia.com/ubuntu-ports|g' /etc/apt/sources.list.d/ubuntu.sources
        elif [ -f /etc/apt/sources.list ]; then
          $SUDO sed -i 's|https\?://archive.ubuntu.com/ubuntu|http://ubuntu-archive-cache.local.gha-runners.nvidia.com/ubuntu|g' /etc/apt/sources.list
          $SUDO sed -i 's|https\?://security.ubuntu.com/ubuntu|http://ubuntu-security-cache.local.gha-runners.nvidia.com/ubuntu|g' /etc/apt/sources.list
          $SUDO sed -i 's|https\?://ports.ubuntu.com/ubuntu-ports|http://ubuntu-ports-cache.local.gha-runners.nvidia.com/ubuntu-ports|g' /etc/apt/sources.list
        else
          echo "No apt sources file found"
          exit 0
        fi
      shell: bash
